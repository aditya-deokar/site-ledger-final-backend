server {
    listen 80;
    server_name api.sitesledger.app;

    # Certbot challenge location (keep this for troubleshooting)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Keep ACME challenge on HTTP and redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.sitesledger.app;

    # SSL configuration (mapped from Certbot volume)
    ssl_certificate /etc/letsencrypt/live/api.sitesledger.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sitesledger.app/privkey.pem;

    # Reverse Proxy with WebSocket support
    location / {
        proxy_pass http://real-estate-api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}
