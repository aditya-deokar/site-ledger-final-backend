name: Build and Deploy

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Always push 'latest' and also a unique tag for history
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/real-estate-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/real-estate-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code (For Config Sync)
        uses: actions/checkout@v4

      - name: Copy Configs, Compose, and Setup to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nginx/default.conf,docker-compose.yml,setup.sh"
          target: "~/real-estate"

      - name: SSH to EC2 and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE_CONTENT
          script: |
            cd ~/real-estate
            chmod +x setup.sh
            ./setup.sh
            
            echo "🚀 Stopping existing containers..."
            sudo docker compose down --remove-orphans || true
            
            echo "🐳 Pulling latest images..."
            sudo docker compose pull
            
            echo "⚡ Starting the API..."
            sudo docker compose up -d --remove-orphans
            
            echo "⏳ Waiting for API to stabilize..."
            # Wait for container to be ready to accept commands
            max_retries=15
            for i in $(seq 1 $max_retries); do
                status=$(sudo docker inspect -f '{{.State.Status}}' real-estate-api)
                if [ "$status" == "running" ]; then
                    echo "✅ API is running! Applying Database Migrations..."
                    # Use npx prisma migrate deploy inside the running container
                    # This ensures the DB is updated before traffic starts
                    if sudo docker exec real-estate-api npx prisma migrate deploy; then
                        echo "✅ Database Migrations Applied Successfully!"
                        break
                    else
                        echo "❌ Database Migration Failed! Check logs."
                        sudo docker logs real-estate-api --tail 30
                        exit 1
                    fi
                elif [ "$status" == "restarting" ] || [ "$status" == "exited" ]; then
                    echo "❌ API crashed on start! Checking logs..."
                    sudo docker logs real-estate-api --tail 30
                    exit 1
                fi
                echo "Still waiting for container... ($i/$max_retries)"
                sleep 2
            done
            
            echo "✨ Deployment Complete! Checking final status..."
            sudo docker ps | grep real-estate-api
            
            # Prune old images to save space
            sudo docker image prune -f


  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: always()
    steps:
      - name: Send Discord Notification
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          username: "Deployment Bot"
          content: |
            **Sites-Ledger Deployment Report**
            **Status:** ${{ needs.deploy.result == 'success' && '✅ SUCCESS' || '❌ FAILURE' }}
            **Commit:** `${{ github.sha }}`
            **Actor:** ${{ github.actor }}
            **Branch:** `${{ github.ref_name }}`
            **Action Link:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
